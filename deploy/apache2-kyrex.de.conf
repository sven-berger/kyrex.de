<VirtualHost *:80>
    ServerName kyrex.de
    ServerAlias www.kyrex.de

    DocumentRoot /var/www/kyrex.de/public

    <Directory /var/www/kyrex.de/public>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/kyrex.de-error.log
    CustomLog ${APACHE_LOG_DIR}/kyrex.de-access.log combined
</VirtualHost>
